<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bautizo - Alberto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Great+Vibes&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --slate-deep: #34495e; /* Azul pizarra profundo de referencia */
            --warm-cream: #fdfbf7; /* Fondo de papel crema */
            --gold: #C5A059;
            --gold-light: #E8D399;
            --text: #2C3E50;
            --celeste-accent: #B2FFFF; /* Celeste como acento sutil */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f1f1f1; /* Fondo exterior */
            font-family: 'Montserrat', sans-serif;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Contenedor Principal con fondo de papel lino texturizado */
        .invitation-container {
            max-width: 480px;
            margin: 0 auto;
            background-color: var(--warm-cream);
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png'); /* Textura de papel natural */
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        /* Sobre de Papel de Acuarela (Animación inicial) */
        .envelope-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #fff;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png'); /* Textura de papel de acuarela */
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 1.5s cubic-bezier(0.77, 0, 0.175, 1), opacity 1.5s ease;
        }

        .envelope-screen.open {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            z-index: 2;
            border-bottom: 2px solid var(--gold-light);
        }

        .wax-seal {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, var(--gold-light) 0%, var(--gold) 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(197, 160, 89, 0.3), inset 0 0 15px rgba(255,255,255,0.5);
            animation: pulse-gold 2s infinite;
            border: 2px solid #fff;
        }

        .wax-seal span {
            font-family: 'Great Vibes', cursive;
            font-size: 50px;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .click-text {
            margin-top: 40px;
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--text);
            z-index: 3;
            animation: float 3s ease-in-out infinite;
        }

        /* Cuerpo de la Invitación (Estilo Editorial) */
        .invitation-body {
            opacity: 0;
            height: 100vh;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .invitation-body.visible {
            opacity: 1;
            transition: opacity 1.5s ease 0.5s;
        }

        /* Clases para animación al hacer scroll */
        .animate-on-scroll {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.7s cubic-bezier(0.5, 0, 0, 1);
        }

        .animate-on-scroll.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Bloque de Encabezado (Color Fijo y Monograma) */
        .header-block {
            background-color: var(--slate-deep);
            color: #fff;
            padding: 50px 20px;
            text-align: center;
            position: relative;
        }
        
        .header-block::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;charset=utf-8,%3Csvg%20width%3D%2240%22%20height%3D%2240%22%20viewBox%3D%220%200%2040%2040%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Cpath%20d%3D%22M20%200c-2.316%201.375-4.632%202.75-6.947%204.125A3.15%203.15%200%200%201%2011%204.5C6.015%204.5%202%208.515%202%2013.5c0%202.946%201.442%205.65%203.737%207.39a3.152%203.152%200%200%201%20.93%203.111C5.074%2029.021%203.382%2034.011%202.214%2039.006c-.033.143-.051.291-.051.441a1.298%201.298%200%200%200%201.298%201.298%200%200%200%201.077-.56C5.093%2038.56%206.66%2036.938%208.21%2035.3c1.378-1.464%202.757-2.928%204.135-4.392%201.761-1.859%202.837-2.825%203.04-3.046a.715.715%200%200%201%20.893-.075c1.171.696%202.342%201.393%203.513%202.089a3.15%203.15%200%200%201%2011-.1c-.139-.236-.28-.472-.423-.706a1.29%201.29%200%200%200-1.078-.56%201.292%201.292%200%200%200-1.298%201.298c0%20.15.018.298.051.441z%22%20fill%3D%22%23fff%22%20fill-opacity%3D%220.03%22%2F%3E%3C%2Fsvg%3E'); /* Patrón de eucalipto sutil */
            opacity: 0.1;
        }

        .monogram {
            font-family: 'Great Vibes', cursive;
            font-size: 70px;
            letter-spacing: 2px;
            border: 2px solid #fff;
            border-radius: 50%;
            width: 120px;
            height: 120px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            background-color: rgba(255,255,255,0.05);
        }

        .title-bautizo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #fff;
            margin-bottom: 10px;
            font-weight: 300;
        }

        /* Secciones del Cuerpo (Fondo Papel Crema) */
        .content-section {
            padding: 50px 25px;
            text-align: center;
            background-color: var(--warm-cream);
            position: relative;
            overflow: hidden;
        }
        
        .eucalipto-edge {
            position: absolute;
            width: 150px;
            opacity: 0.15;
            z-index: 0;
        }
        
        .eucalipto-edge.top-right {
            top: -30px;
            right: -30px;
            transform: rotate(-10deg);
        }
        
        .eucalipto-edge.bottom-left {
            bottom: -30px;
            left: -30px;
            transform: rotate(170deg);
        }

        h1.script-name {
            font-family: 'Great Vibes', cursive;
            font-size: 85px;
            color: var(--slate-deep);
            margin: 10px 0;
            line-height: 1;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.03);
            position: relative;
            z-index: 1;
        }

        .divider {
            width: 50px;
            height: 1px;
            background-color: var(--gold);
            margin: 25px auto 35px;
            opacity: 0.7;
        }

        .quote-bautismo {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 24px;
            color: var(--text);
            margin-bottom: 40px;
            max-width: 320px;
            margin: 0 auto 40px;
            line-height: 1.4;
            position: relative;
            z-index: 1;
        }

        .section-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            color: var(--gold);
            margin: 35px 0 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .names {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 7px;
            color: var(--text);
        }

        /* Bloque de Fecha Tipográfico Grande */
        .date-block-large {
            padding: 60px 25px;
            text-align: center;
            background-color: #fff;
            background-image: url('https://www.transparenttextures.com/patterns/fabric-of-the-nation.png');
            border-top: 1px solid rgba(0,0,0,0.03);
            border-bottom: 1px solid rgba(0,0,0,0.03);
        }

        .large-day-number {
            font-family: 'Cormorant Garamond', serif;
            font-size: 140px;
            font-weight: 600;
            line-height: 1;
            color: var(--slate-deep);
            margin-bottom: 5px;
        }

        .large-month-year {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text);
            margin-bottom: 15px;
        }

        .large-weekday-time {
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--gold);
            font-weight: 500;
        }

        /* Cuenta Regresiva (Subsección de la fecha) */
        .countdown-wrap {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .time-box {
            color: var(--text);
            padding: 15px;
            min-width: 60px;
            border: 1px solid rgba(0,0,0,0.05);
            background: rgba(255,255,255,0.8);
        }

        .time-box span {
            display: block;
            font-size: 26px;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            color: var(--slate-deep);
        }

        .time-box small {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
        }

        /* Calendario (Debajo de Cuenta Atrás, Estilo Editorial) */
        .calendar-section {
            padding: 50px 25px;
            text-align: center;
            background-color: #fff;
        }

        .calendar-header {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            color: var(--slate-deep);
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            font-size: 14px;
            font-family: 'Montserrat', sans-serif;
            margin: 0 auto;
            max-width: 320px;
        }

        .day-name {
            font-weight: 600;
            font-size: 11px;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .day {
            padding: 12px 0;
            border-radius: 50%;
            transition: all 0.3s ease;
            font-weight: 400;
        }

        .day.highlight {
            background-color: var(--slate-deep);
            color: #fff;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(52, 73, 94, 0.2);
            transform: scale(1.1);
        }

        /* Bloque de Ubicaciones (Color Fijo y Tarjetas de Papel) */
        .locations-block {
            background-color: var(--slate-deep);
            color: #fff;
            padding: 60px 25px;
            position: relative;
        }

        .location-card {
            background-color: #fff;
            color: var(--text);
            padding: 35px 25px;
            margin: 25px 0;
            border: 1px solid rgba(0,0,0,0.03);
            border-radius: 2px; /* Aspecto más editorial/tarjeta */
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .icon-linear {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            color: var(--gold);
        }

        .icon-linear svg {
            width: 30px;
            fill: none;
            stroke: var(--gold);
            stroke-width: 1.5;
        }

        .location-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            margin-bottom: 12px;
            color: var(--slate-deep);
            font-weight: 500;
        }

        .btn {
            display: inline-block;
            background: transparent;
            color: var(--text);
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 2px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 15px;
            border: 1px solid var(--text);
            transition: all 0.3s;
            font-weight: 500;
        }

        .btn:hover {
            background: var(--text);
            color: #fff;
        }

        .btn-fill {
            background: var(--gold);
            color: #fff;
            border: none;
            width: 100%;
            margin-bottom: 12px;
            border-radius: 2px;
        }
        
        .btn-fill:hover {
            background: var(--slate-deep);
        }

        /* Sección RSVP (Color Fijo al Final) */
        .rsvp-section {
            background-color: var(--slate-deep);
            color: #fff;
            padding: 60px 25px;
            text-align: center;
        }

        .rsvp-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            color: #fff;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .btn-whatsapp {
            background-color: #fff;
            color: var(--slate-deep);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px 30px;
            border-radius: 2px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 25px auto 0;
            max-width: 280px;
            box-shadow: 0 5px 15px rgba(255,255,255,0.1);
            animation: pulse-green 2s infinite;
        }

        .btn-whatsapp svg {
            width: 18px;
            fill: var(--slate-deep);
        }

        /* Pie de Página */
        .footer-section {
            padding: 50px 25px;
            text-align: center;
            background-color: var(--warm-cream);
        }

        /* Keyframes */
        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(197, 160, 89, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(197, 160, 89, 0); }
            100% { box-shadow: 0 0 0 0 rgba(197, 160, 89, 0); }
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.2); }
            70% { box-shadow: 0 0 0 15px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

    </style>
</head>
<body>

    <div class="invitation-container">
        
        <div class="envelope-screen" id="envelope">
            <div class="envelope-flap"></div>
            <div class="wax-seal" onclick="openEnvelope()">
                <span>A</span>
            </div>
            <p class="click-text">Toca el sello para abrir</p>
        </div>

        <div class="invitation-body" id="invitationBody">
            
            <div class="header-block">
                <div class="monogram">A</div>
                <p class="title-bautizo">Mi Bautizo</p>
            </div>

            <div class="content-section">
                <img src="data:image/svg+xml;charset=utf-8,%3Csvg%20width%3D%22200%22%20height%3D%22200%22%20viewBox%3D%220%200%20200%20200%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Cpath%20d%3D%22M100%200c-11.58%206.875-23.16%2013.75-34.735%2020.625A15.75%2015.75%200%200%201%2055%2022.5C30.075%2022.5%2010%2042.575%2010%2067.5c0%2014.73%207.21%2028.25%2018.685%2036.95a15.76%2015.76%200%200%201%204.65%2015.555c-6.1%2025.105-14.56%2050.055-20.4%2075.03c-.165.715-.255%
